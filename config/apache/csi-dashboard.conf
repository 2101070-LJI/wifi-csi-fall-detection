# WiFi-CSI 낙상 감지 대시보드 — Apache VirtualHost 설정
#
# 설치 방법:
#   sudo cp config/apache/csi-dashboard.conf /etc/apache2/sites-available/
#   sudo a2enmod proxy proxy_http
#   sudo a2dissite 000-default
#   sudo a2ensite csi-dashboard
#   sudo systemctl reload apache2
#
# 대시보드: http://<RPi IP>/
# FastAPI:  http://<RPi IP>/api/  (→ localhost:8000)
# API 문서: http://<RPi IP>/api/docs

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /home/lee/project/dashboard

    # PHP 인덱스 파일 우선
    DirectoryIndex index.php index.html

    <Directory /home/lee/project/dashboard>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # ── FastAPI 리버스 프록시 (/api/* → :8000) ────────────────────────────
    ProxyPreserveHost On

    ProxyPass        /api  http://localhost:8000
    ProxyPassReverse /api  http://localhost:8000

    # ── 로그 ──────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/csi-dashboard-error.log
    CustomLog ${APACHE_LOG_DIR}/csi-dashboard-access.log combined
</VirtualHost>
